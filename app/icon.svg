<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Upward trend line -->
  <polyline points="6,22 11,18 16,20 21,12 26,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polyline points="23,8 26,8 26,11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line -->
  <line x1="6" y1="25" x2="26" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
